- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txtname: Convert Paperpile BibTeX

on:
  schedule:
    - cron: "0 21 * * *"  # JST 06:00
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Convert BibTeX to CSV and JSON
        run: python scripts/bib_to_csv.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/library_all.csv data/library_all.json
          git diff --cached --quiet || git commit -m "Update generated CSV and JSON"
          git push
